<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline Plus - 专业大纲编辑器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        
        /* 核心逻辑：40字宽度并允许溢出 */
        .node-input {
            min-height: 1.5em;
            line-height: 1.5;
            display: block;
            outline: none;
            word-break: break-all;
            white-space: pre-wrap;
            position: relative;
            width: 40em; 
            min-width: 40em;
            flex-shrink: 0;
        }
        
        .main-content-area {
            overflow-x: auto;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .node-input:empty:before {
            content: attr(data-placeholder);
            color: #cbd5e1;
            pointer-events: none;
            display: block;
        }

        .node-input:focus { border-bottom: 2px solid #6366f1 !important; }
        
        /* 工具栏跟随逻辑 */
        .action-sticky-bar {
            position: sticky;
            left: 0; 
            z-index: 20; 
            height: fit-content;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 2px 4px;
            border-radius: 6px;
        }

        .drag-handle {
            cursor: grab;
            color: #cbd5e1;
            padding: 4px 4px 4px 0;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<div id="app" class="flex h-screen overflow-hidden" v-cloak @mousedown="handleGlobalClick">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30">
        <div class="p-6 font-black text-xl text-indigo-600 border-b border-slate-50 italic">Outline Plus</div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <div v-for="proj in projects" :key="proj.id" 
                 @click="switchProject(proj.id)"
                 :class="['p-3 rounded-lg cursor-pointer transition-all flex justify-between items-center group', currentProjectId === proj.id ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-slate-50 text-slate-600']">
                <span class="truncate font-medium text-sm">{{ getTitleText(proj.title) || '新项目' }}</span>
                <i @click.stop="confirmDeleteProject(proj.id)" class="fas fa-times text-xs opacity-0 group-hover:opacity-100 hover:text-red-500 p-1 transition-opacity"></i>
            </div>
        </div>
        
        <div class="p-4 border-t relative space-y-2">
            <button @click="importProject" class="w-full py-2 bg-white border border-slate-200 hover:border-indigo-300 hover:text-indigo-600 text-slate-500 rounded-lg transition-all flex items-center justify-center gap-2 text-sm font-bold shadow-sm">
                <i class="fas fa-file-import"></i> 导入项目
            </button>
            <button @click.stop="showTemplateMenu = !showTemplateMenu" class="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-md flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> 新项目
            </button>
            <div v-if="showTemplateMenu" class="absolute bottom-full left-4 right-4 mb-2 bg-white border border-slate-200 rounded-xl shadow-2xl p-2 z-50">
                <div v-for="tpl in templateList" :key="tpl.id" @click="createNewProject(tpl)" class="flex items-center gap-3 p-2.5 hover:bg-indigo-50 rounded-lg cursor-pointer">
                    <div class="w-8 h-8 rounded flex items-center justify-center text-xs" :class="tpl.iconBg"><i :class="tpl.icon"></i></div>
                    <div class="text-xs font-bold text-slate-700">{{ tpl.name }}</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 main-content-area bg-white relative" ref="mainScrollRef" @wheel="handleShiftScroll">
        <div v-if="currentProject" class="min-w-max py-20 px-10">
            <div class="flex justify-between items-start mb-10 w-[40em]">
                <textarea 
                    v-model="currentProject.title" 
                    @input="handleInput($event); save()" 
                    class="node-input text-4xl font-black border-none outline-none text-slate-800 placeholder-slate-200" 
                    rows="1"
                    placeholder="输入标题..."
                ></textarea>
                <div class="flex items-center gap-3 ml-4 shrink-0">
                    <button @click="copyAllText" class="px-4 py-2 bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-500 rounded-lg transition-all flex items-center gap-2 text-sm font-bold shadow-sm h-[40px]">
                        <i class="fas" :class="copyStatus ? 'fa-check' : 'fa-copy'"></i>
                        {{ copyStatus ? '已复制' : '复制链接' }}
                    </button>
                </div>
            </div>
            
            <div class="space-y-1 sortable-container">
                <outline-node 
                    v-for="(node, index) in currentProject.nodes" 
                    :key="node.id"
                    :node="node" 
                    :depth="0" 
                    :parent-list="currentProject.nodes" 
                    :index="index"
                    :multi-select="multiSelectMode"
                    :selected-ids="selectedNodeIds"
                    :preview-style="activeStyle"
                    @update="save"
                    @toggle-select="toggleNodeSelection"
                    @focus-node="handleNodeFocus"
                    @request-delete="confirmDeleteNode"
                    @copy-node="copyNodeStructure"
                    @paste-node="pasteNodeStructure">
                </outline-node>
            </div>
            <div @click="addTopNode" class="mt-10 w-[40em] py-8 border-2 border-dashed border-slate-100 rounded-xl text-center text-slate-300 hover:text-indigo-400 hover:border-indigo-200 hover:bg-indigo-50 cursor-pointer">
                <i class="fas fa-plus-circle text-xl"></i>
                <p class="text-sm mt-2 font-medium">添加顶级节点</p>
            </div>
        </div>
    </main>

    <aside id="style-panel" class="w-80 bg-slate-50 flex flex-col border-l border-slate-200 shrink-0 z-30" v-if="currentProject">
        <div class="p-6 border-b bg-white">
            <h2 class="font-black text-slate-800 flex items-center gap-2"><i class="fas fa-palette text-indigo-500"></i> 样式调整</h2>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字体型号</label>
                    <select v-model="activeStyle.fontFamily" @change="syncSelectionStyle('fontFamily')" class="w-full p-2 bg-slate-50 border border-slate-100 rounded-lg text-sm">
                        <option v-for="font in fontOptions" :key="font.value" :value="font.value">{{ font.label }}</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字体颜色</label>
                    <div class="flex items-center gap-3">
                        <input type="color" v-model="activeStyle.color" @input="syncSelectionStyle('color')" class="w-8 h-8 rounded border-none cursor-pointer">
                        <span class="text-xs font-mono text-slate-500 uppercase">{{ activeStyle.color }}</span>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字号大小 ({{ activeStyle.fontSize }}PX)</label>
                    <input type="range" min="12" max="60" v-model="activeStyle.fontSize" @input="syncSelectionStyle('fontSize')" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button @click="toggleStyle('fontWeight', 'bold', 'normal')" :class="activeStyle.fontWeight === 'bold' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'" class="py-2 rounded-lg text-xs font-bold transition-all">B 加粗</button>
                    <button @click="toggleStyle('fontStyle', 'italic', 'normal')" :class="activeStyle.fontStyle === 'italic' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'" class="py-2 rounded-lg text-xs font-bold transition-all">I 斜体</button>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字间距 ({{ activeStyle.letterSpacing }}PX)</label>
                    <input type="range" min="-2" max="15" step="0.5" v-model="activeStyle.letterSpacing" @input="syncSelectionStyle('letterSpacing')" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
            </div>
            <button @click="multiSelectMode ? exitMultiSelect() : enterMultiSelect()" class="w-full py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-sm transition-all">
                <i class="fas fa-check-square"></i> {{ multiSelectMode ? '退出多选' : '节点多选' }}
            </button>
            <button v-if="multiSelectMode" @click="applyStyleToSelected" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm shadow-lg">应用样式到选中项</button>
        </div>
    </aside>

    <transition name="fade">
        <div v-if="modal.show" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm px-4">
            <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden">
                <div class="p-6">
                    <h3 class="text-lg font-bold text-slate-800 mb-2">{{ modal.title }}</h3>
                    <p class="text-slate-500 text-sm">{{ modal.message }}</p>
                </div>
                <div class="bg-slate-50 p-4 flex gap-3 justify-end">
                    <button @click="modal.show = false" class="px-4 py-2 text-sm font-bold text-slate-500">取消</button>
                    <button @click="executeModalAction" class="bg-indigo-600 px-6 py-2 text-white rounded-lg text-sm font-bold">确认</button>
                </div>
            </div>
        </div>
    </transition>
</div>

<template id="node-template">
    <div class="node-wrapper py-1 transition-colors rounded-lg" :style="{ marginLeft: depth > 0 ? '32px' : '0' }">
        <div class="group flex items-start relative px-2">
            <div v-if="multiSelect" class="mt-2 mr-2 shrink-0">
                <input type="checkbox" :checked="selectedIds.includes(node.id)" @change="$emit('toggle-select', node.id)" class="w-4 h-4 rounded text-indigo-600">
            </div>
            <div class="flex items-center mt-1.5 shrink-0">
                <div class="drag-handle flex items-center justify-center text-xs"><i class="fas fa-grip-vertical"></i></div>
                <div v-if="node.children && node.children.length > 0" @click="node.isCollapsed = !node.isCollapsed" class="w-4 h-4 flex items-center justify-center cursor-pointer text-slate-400 hover:text-indigo-500" :class="{ '-rotate-90': node.isCollapsed }">
                    <i class="fas fa-chevron-down text-[10px]"></i>
                </div>
                <div v-else class="w-4"></div>
            </div>
            <div class="flex-1 relative">
                <div :id="'input-' + node.id" contenteditable="true" @input="onLocalInput" @blur="onBlur" @focus="$emit('focus-node', node.id)" @keydown.tab.prevent="onTab" @keydown.enter.prevent="onEnter" @keydown.delete="onDelete" class="node-input bg-transparent border-none outline-none py-1" :style="computedBaseStyle" ref="editorRef"></div>
            </div>
            <div class="action-sticky-bar flex items-center gap-1 shrink-0 ml-4 opacity-0 group-hover:opacity-100">
                <i @click="addChild" class="fas fa-plus p-1.5 text-slate-400 hover:text-indigo-500 cursor-pointer"></i>
                <i @click="$emit('request-delete', { parentList, index })" class="fas fa-trash-alt p-1.5 text-slate-400 hover:text-red-500 cursor-pointer"></i>
                <i @click="$emit('copy-node', node)" class="fas fa-clone p-1.5 text-slate-400 hover:text-indigo-500 cursor-pointer"></i>
                <i @click="$emit('paste-node', node)" class="fas fa-paste p-1.5 text-slate-400 hover:text-indigo-500 cursor-pointer"></i>
            </div>
        </div>
        <div v-if="node.children && node.children.length > 0 && !node.isCollapsed" class="mt-1 border-l-2 border-slate-100/50 ml-4 sortable-container">
            <outline-node v-for="(child, idx) in node.children" :key="child.id" :node="child" :depth="depth + 1" :parent-list="node.children" :index="idx" :multi-select="multiSelect" :selected-ids="selectedIds" :preview-style="previewStyle" @update="$emit('update')" @focus-node="(id) => $emit('focus-node', id)" @toggle-select="(id) => $emit('toggle-select', id)" @request-delete="(payload) => $emit('request-delete', payload)" @copy-node="(n) => $emit('copy-node', n)" @paste-node="(n) => $emit('paste-node', n)"></outline-node>
        </div>
    </div>
</template>

<script>
const { createApp, ref, reactive, nextTick, computed, onMounted } = Vue;

const FONT_FAMILIES = [
    { label: '系统默认', value: 'inherit' },
    { label: '黑体 (无衬线)', value: '"PingFang SC", "Microsoft YaHei", sans-serif' },
    { label: '宋体 (衬线)', value: '"SimSun", "STSong", serif' },
    { label: '楷体 (手写)', value: '"KaiTi", "STKaiti", cursive' },
    { label: '等宽字体', value: 'ui-monospace, SFMono-Regular, Consolas, monospace' }
];

const DEFAULT_STYLE = { color: '#1E293B', fontSize: 16, fontWeight: 'normal', fontStyle: 'normal', letterSpacing: 0, fontFamily: 'inherit' };

const OutlineNode = {
    name: 'OutlineNode',
    template: '#node-template',
    props: ['node', 'depth', 'parentList', 'index', 'multiSelect', 'selectedIds', 'previewStyle'],
    emits: ['update', 'request-delete', 'toggle-select', 'focus-node', 'copy-node', 'paste-node'],
    setup(props, { emit }) {
        const editorRef = ref(null);
        const computedBaseStyle = computed(() => {
            const isSelected = props.multiSelect && props.selectedIds.includes(props.node.id);
            const s = isSelected ? props.previewStyle : (props.node.style || {});
            return {
                color: s.color || '#1e293b',
                fontSize: (s.fontSize || (props.depth === 0 ? 20 : 16)) + 'px',
                fontWeight: s.fontWeight || (props.depth === 0 ? 'bold' : 'normal'),
                fontStyle: s.fontStyle || 'normal',
                fontFamily: s.fontFamily || 'inherit',
                letterSpacing: (s.letterSpacing || 0) + 'px'
            };
        });

        onMounted(() => {
            if (editorRef.value) editorRef.value.innerHTML = props.node.title || '';
            nextTick(() => {
                const containers = document.querySelectorAll('.sortable-container');
                containers.forEach(el => {
                    if (el._sortable) return;
                    el._sortable = Sortable.create(el, { handle: '.drag-handle', animation: 150, onEnd: (evt) => {
                        const list = props.parentList;
                        const item = list.splice(evt.oldIndex, 1)[0];
                        list.splice(evt.newIndex, 0, item);
                        emit('update');
                    }});
                });
            });
        });

        const onLocalInput = (e) => { props.node.title = e.target.innerHTML; emit('update'); };
        const onBlur = () => { emit('update'); };
        const onEnter = () => document.execCommand('insertLineBreak');
        const onTab = () => {
            if (props.index > 0) {
                const prev = props.parentList[props.index - 1];
                const current = props.parentList.splice(props.index, 1)[0];
                if (!prev.children) prev.children = [];
                prev.children.push(current);
                emit('update');
                nextTick(() => document.getElementById('input-' + current.id)?.focus());
            }
        };
        const onDelete = (e) => {
            if ((props.node.title === '' || props.node.title === '<br>') && props.parentList.length > 1) {
                props.parentList.splice(props.index, 1);
                emit('update');
            }
        };
        const addChild = () => {
            if (!props.node.children) props.node.children = [];
            const newNode = { id: 'n-' + Date.now() + Math.random(), title: '', children: [], isCollapsed: false, style: null };
            props.node.children.push(newNode);
            props.node.isCollapsed = false;
            emit('update');
            nextTick(() => document.getElementById('input-' + newNode.id)?.focus());
        };

        return { onTab, onDelete, addChild, onLocalInput, onBlur, onEnter, computedBaseStyle, editorRef };
    }
};

createApp({
    components: { OutlineNode },
    setup() {
        const projects = ref([]);
        const currentProjectId = ref(null);
        const copyStatus = ref(false);
        const showTemplateMenu = ref(false);
        const mainScrollRef = ref(null);
        const fontOptions = ref(FONT_FAMILIES);
        const activeStyle = reactive({...DEFAULT_STYLE});
        const multiSelectMode = ref(false);
        const selectedNodeIds = ref([]);
        const lastFocusedNodeId = ref(null);
        const modal = reactive({ show: false, title: '', message: '', onConfirm: null });

        const currentProject = computed(() => projects.value.find(p => p.id === currentProjectId.value));

        onMounted(() => {
            const saved = localStorage.getItem('outline_rich_v2');
            if (saved) {
                projects.value = JSON.parse(saved);
                if (projects.value.length > 0) currentProjectId.value = projects.value[0].id;
            }
        });

        const handleShiftScroll = (e) => { if (e.shiftKey) { e.preventDefault(); mainScrollRef.value.scrollLeft += e.deltaY; } };
        const save = () => localStorage.setItem('outline_rich_v2', JSON.stringify(projects.value));
        const handleInput = (e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; };
        const switchProject = (id) => { currentProjectId.value = id; multiSelectMode.value = false; };

        const createNewProject = (tpl) => {
            const id = 'p-' + Date.now();
            projects.value.unshift({ id, title: tpl.title, nodes: JSON.parse(JSON.stringify(tpl.nodes)) });
            currentProjectId.value = id;
            showTemplateMenu.value = false;
            save();
        };

        // 修复：导入项目
        const importProject = () => {
            const input = prompt("请粘贴导出的项目数据：");
            if (!input) return;
            try {
                const data = JSON.parse(input.includes('PROJ_DATA_START') ? input.match(/PROJ_DATA_START---(.*?)---PROJ_DATA_END/)[1] : input);
                const newId = 'p-' + Date.now();
                projects.value.unshift({ id: newId, title: data.title || "导入的项目", nodes: data.nodes });
                currentProjectId.value = newId;
                save();
            } catch (e) { alert("格式错误！"); }
        };

        const copyAllText = () => {
            const gen = (nodes, d = 0) => nodes.reduce((acc, n) => acc + "  ".repeat(d) + "- " + n.title.replace(/<[^>]+>/g, '') + "\n" + (n.children ? gen(n.children, d + 1) : ""), "");
            const data = { title: currentProject.value.title, nodes: currentProject.value.nodes };
            const fullContent = `大纲内容：\n${gen(currentProject.value.nodes)}\n\n---PROJ_DATA_START---${JSON.stringify(data)}---PROJ_DATA_END---`;
            navigator.clipboard.writeText(fullContent).then(() => {
                copyStatus.value = true;
                setTimeout(() => copyStatus.value = false, 2000);
            });
        };

        const toggleStyle = (prop, val1, val2) => { activeStyle[prop] = activeStyle[prop] === val1 ? val2 : val1; };
        const enterMultiSelect = () => { multiSelectMode.value = true; selectedNodeIds.value = []; };
        const exitMultiSelect = () => { multiSelectMode.value = false; };
        const toggleNodeSelection = (id) => {
            const idx = selectedNodeIds.value.indexOf(id);
            if (idx > -1) selectedNodeIds.value.splice(idx, 1);
            else selectedNodeIds.value.push(id);
        };

        const applyStyleToSelected = () => {
            const update = (nodes) => nodes.forEach(n => {
                if (selectedNodeIds.value.includes(n.id)) n.style = {...activeStyle};
                if (n.children) update(n.children);
            });
            update(currentProject.value.nodes);
            save(); exitMultiSelect();
        };

        // 修复：删除项目
        const confirmDeleteProject = (id) => {
            modal.title = "删除项目"; modal.message = "确定删除该项目吗？"; modal.show = true;
            modal.onConfirm = () => {
                projects.value = projects.value.filter(p => p.id !== id);
                if (currentProjectId.value === id) currentProjectId.value = projects.value[0]?.id || null;
                save();
            };
        };

        const confirmDeleteNode = ({ parentList, index }) => {
            modal.title = "删除节点"; modal.message = "确定删除及其子节点吗？"; modal.show = true;
            modal.onConfirm = () => { parentList.splice(index, 1); save(); };
        };

        const executeModalAction = () => { modal.onConfirm(); modal.show = false; };
        const getTitleText = (h) => h.replace(/<[^>]+>/g, '');
        const handleNodeFocus = (id) => { lastFocusedNodeId.value = id; };
        const handleGlobalClick = (e) => { if (!e.target.closest('.relative') && !e.target.closest('button')) showTemplateMenu.value = false; };

        return { 
            projects, currentProjectId, currentProject, copyStatus, activeStyle, multiSelectMode, selectedNodeIds,
            modal, showTemplateMenu, mainScrollRef, fontOptions,
            templateList: [{ id: 'blank', name: '空白画布', icon: 'fas fa-file', iconBg: 'bg-slate-100', title: '新项目', nodes: [{ title: '', children: [], isCollapsed: false }] }],
            createNewProject, switchProject, addTopNode, save, handleInput, copyAllText, toggleNodeSelection, 
            enterMultiSelect, exitMultiSelect, applyStyleToSelected, handleNodeFocus, handleGlobalClick, toggleStyle,
            getTitleText, confirmDeleteProject, confirmDeleteNode, executeModalAction, importProject, handleShiftScroll
        };
    }
}).mount('#app');
</script>
</body>
</html>
