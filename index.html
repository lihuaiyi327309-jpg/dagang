<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline Plus - 模板化大纲编辑器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .node-input {
            min-height: 1.5em;
            line-height: 1.5;
            display: block;
            width: 100%;
            outline: none;
            word-break: break-all;
            white-space: pre-wrap;
            position: relative;
        }
        
        .node-input:empty:before {
            content: attr(data-placeholder);
            color: #cbd5e1;
            pointer-events: none;
            display: block;
        }

        .node-input:focus { border-bottom: 2px solid #6366f1 !important; }
        
        .style-override * {
            color: inherit !important;
            font-size: inherit !important;
            font-weight: inherit !important;
            font-style: inherit !important;
            letter-spacing: inherit !important;
            font-family: inherit !important;
        }

        .preview-text {
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
            cursor: pointer;
        }

        .action-sticky-bar {
            position: sticky;
            top: 4px; 
            z-index: 20; 
            height: fit-content;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 2px 4px;
            border-radius: 6px;
        }

        .drag-handle {
            cursor: grab;
            color: #cbd5e1;
            padding: 4px 8px 4px 0;
            transition: color 0.2s;
        }
        .drag-handle:active { cursor: grabbing; }
        .node-wrapper:hover .drag-handle { color: #94a3b8; }
        
        .sortable-ghost { opacity: 0.4; background: #f1f5f9 !important; border-radius: 8px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .scale-enter-active, .scale-leave-active { transition: transform 0.2s ease, opacity 0.2s ease; }
        .scale-enter-from, .scale-leave-to { transform: scale(0.95); opacity: 0; }
        
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.2s ease-out; }
        .slide-up-enter-from, .slide-up-leave-to { transform: translateY(10px); opacity: 0; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-icon { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<div id="app" class="flex h-screen overflow-hidden" v-cloak @mousedown="handleGlobalClick">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-6 font-black text-xl text-indigo-600 border-b border-slate-50 italic">Outline Plus</div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <div v-for="proj in projects" :key="proj.id" 
                 @click="switchProject(proj.id)"
                 :class="['p-3 rounded-lg cursor-pointer transition-all flex justify-between items-center group', currentProjectId === proj.id ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-slate-50 text-slate-600']">
                <span class="truncate font-medium text-sm">{{ getTitleText(proj.title) || '新项目' }}</span>
                <i @click.stop="confirmDeleteProject(proj.id)" class="fas fa-times text-xs opacity-0 group-hover:opacity-100 hover:text-red-500 p-1 transition-opacity"></i>
            </div>
        </div>
        
        <div class="p-4 border-t relative space-y-2">
            <transition name="slide-up">
                <div v-if="showTemplateMenu" class="absolute bottom-full left-4 right-4 mb-2 bg-white border border-slate-200 rounded-xl shadow-2xl p-2 z-50">
                    <div v-for="tpl in templateList" :key="tpl.id" @click="createNewProject(tpl)" class="flex items-center gap-3 p-2.5 hover:bg-indigo-50 rounded-lg cursor-pointer transition-colors">
                        <div class="w-8 h-8 rounded flex items-center justify-center text-xs" :class="tpl.iconBg">
                            <i :class="tpl.icon"></i>
                        </div>
                        <div class="text-xs font-bold text-slate-700">{{ tpl.name }}</div>
                    </div>
                </div>
            </transition>

            <button @click="importProject" class="w-full py-2 bg-white border border-slate-200 hover:border-indigo-300 hover:text-indigo-600 text-slate-500 rounded-lg transition-all flex items-center justify-center gap-2 text-sm font-bold shadow-sm">
                <i class="fas fa-file-import"></i>
                导入项目
            </button>

            <button @click.stop="showTemplateMenu = !showTemplateMenu" class="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-md shadow-indigo-100 flex items-center justify-center gap-2">
                <i class="fas" :class="showTemplateMenu ? 'fa-times' : 'fa-plus'"></i>
                {{ showTemplateMenu ? '取消' : '新项目' }}
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-white border-r border-slate-100 relative">
        <transition name="fade" mode="out-in">
            <div v-if="currentProject" :key="currentProjectId" class="max-w-3xl mx-auto py-20 px-10">
                <div class="flex justify-between items-start mb-10">
                    <div class="flex-1">
                        <textarea 
                            v-model="currentProject.title" 
                            @input="handleInput($event); save()" 
                            class="node-input text-4xl font-black border-none outline-none text-slate-800 placeholder-slate-200" 
                            rows="1"
                            placeholder="输入标题..."
                        ></textarea>
                        
                        <div v-if="multiSelectMode" class="mt-4 flex flex-wrap gap-2 items-center">
                            <button @click="selectAllNodes" class="text-xs font-bold px-2 py-1 bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 flex items-center gap-1 transition-colors">
                                <i class="fas fa-check-double"></i> 全选所有
                            </button>
                            <div class="h-4 w-[1px] bg-slate-200 mx-1"></div>
                            <button 
                                v-for="depth in availableDepths" 
                                :key="depth"
                                @click="selectNodesByDepth(depth)"
                                class="text-[10px] font-bold px-2 py-1 bg-slate-100 text-slate-500 rounded hover:bg-slate-200 transition-colors"
                            >
                                全选{{ depth + 1 }}级
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 ml-4">
                        <button @click="copyAllText" class="px-4 py-2 bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-500 rounded-lg transition-all flex items-center gap-2 shrink-0 text-sm font-bold shadow-sm h-[40px]">
                            <i class="fas" :class="copyStatus ? 'fa-check' : 'fa-copy'"></i>
                            {{ copyStatus ? '已复制' : '复制链接' }}
                        </button>

                        <transition name="fade">
                            <button 
                                v-if="multiSelectMode && selectedNodeIds.length > 0" 
                                @click="confirmDeleteSelectedNodes"
                                class="px-4 py-2 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-all shadow-sm border border-red-100 flex items-center gap-2 shrink-0 text-sm font-bold h-[40px]"
                            >
                                <i class="fas fa-trash-alt"></i>
                                删除
                            </button>
                        </transition>
                    </div>
                </div>
                
                <div class="space-y-1 sortable-container" :data-id="'root'">
                    <outline-node 
                        v-for="(node, index) in currentProject.nodes" 
                        :key="node.id"
                        :node="node" 
                        :depth="0" 
                        :parent-list="currentProject.nodes" 
                        :index="index"
                        :multi-select="multiSelectMode"
                        :selected-ids="selectedNodeIds"
                        :preview-style="activeStyle"
                        @update="save"
                        @toggle-select="toggleNodeSelection"
                        @focus-node="handleNodeFocus"
                        @request-delete="confirmDeleteNode">
                    </outline-node>
                </div>

                <div @click="addTopNode" class="mt-10 py-8 border-2 border-dashed border-slate-100 rounded-xl text-center text-slate-300 hover:text-indigo-400 hover:border-indigo-200 hover:bg-indigo-50 cursor-pointer transition-all group">
                    <i class="fas fa-plus-circle text-xl group-hover:scale-110 transition-transform"></i>
                    <p class="text-sm mt-2 font-medium">点击添加顶级节点</p>
                </div>
            </div>

            <div v-else class="h-full flex flex-col items-center justify-center p-10 text-center">
                <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6 float-icon text-indigo-400 shadow-inner">
                    <i class="fas fa-feather-alt text-4xl"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">开启你的思维灵感</h2>
                <p class="text-slate-400 max-w-xs mb-8">当前没有活跃项目，点击左侧按钮新建或导入一个大纲开始创作。</p>
                <div class="flex gap-4">
                    <button @click.stop="showTemplateMenu = true" class="px-8 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700 transform hover:-translate-y-1 transition-all">
                        立即创建
                    </button>
                    <button @click="importProject" class="px-8 py-3 bg-white border border-slate-200 text-slate-600 rounded-full font-bold shadow-sm hover:bg-slate-50 transform hover:-translate-y-1 transition-all">
                        导入已有项目
                    </button>
                </div>
            </div>
        </transition>
    </main>

    <aside id="style-panel" class="w-80 bg-slate-50 flex flex-col border-l border-slate-200 shrink-0" v-if="currentProject" @mousedown.stop>
        <div class="p-6 border-b bg-white flex justify-between items-center">
            <h2 class="font-black text-slate-800 flex items-center gap-2">
                <i class="fas fa-palette text-indigo-500"></i> 样式调整
            </h2>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字体型号</label>
                    <select v-model="activeStyle.fontFamily" @change="syncSelectionStyle('fontFamily')" class="w-full p-2 bg-slate-50 border border-slate-100 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <option v-for="font in fontOptions" :key="font.value" :value="font.value" :style="{ fontFamily: font.value }">
                            {{ font.label }}
                        </option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字体颜色</label>
                    <div class="flex items-center gap-3">
                        <input type="color" v-model="activeStyle.color" @input="syncSelectionStyle('color')" class="w-8 h-8 rounded border-none cursor-pointer">
                        <span class="text-xs font-mono text-slate-500 uppercase">{{ activeStyle.color }}</span>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字号大小 ({{ activeStyle.fontSize }}px)</label>
                    <input type="range" min="12" max="60" v-model="activeStyle.fontSize" @input="syncSelectionStyle('fontSize')" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button @click="toggleStyle('fontWeight', 'bold', 'normal')" :class="activeStyle.fontWeight === 'bold' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'" class="py-2 rounded-lg text-xs font-bold transition-all">
                        <i class="fas fa-bold"></i> 加粗
                    </button>
                    <button @click="toggleStyle('fontStyle', 'italic', 'normal')" :class="activeStyle.fontStyle === 'italic' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'" class="py-2 rounded-lg text-xs font-bold transition-all">
                        <i class="fas fa-italic"></i> 斜体
                    </button>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">字间距 ({{ activeStyle.letterSpacing }}px)</label>
                    <input type="range" min="-2" max="15" step="0.5" v-model="activeStyle.letterSpacing" @input="syncSelectionStyle('letterSpacing')" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
            </div>

            <div class="pt-4 border-t border-slate-200 space-y-3">
                <template v-if="!multiSelectMode">
                    <button @click="enterMultiSelect" class="w-full py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-sm transition-all hover:bg-slate-50">
                        <i class="fas fa-check-square"></i> 节点多选
                    </button>
                </template>
                <template v-else>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="applyStyleToSelected" class="py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                            <i class="fas fa-check"></i> 应用样式
                        </button>
                        <button @click="exitMultiSelect" class="py-3 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all">
                            退出多选
                        </button>
                    </div>
                    <p class="text-[10px] text-center text-slate-400">已选中 {{ selectedNodeIds.length }} 个节点 (实时预览中)</p>
                </template>
            </div>
        </div>
    </aside>

    <transition name="fade">
        <div v-if="modal.show" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm px-4">
            <transition name="scale" appear>
                <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-100">
                    <div class="p-6">
                        <div :class="modal.isDanger ? 'bg-red-50 text-red-500' : 'bg-indigo-50 text-indigo-500'" class="w-12 h-12 rounded-full flex items-center justify-center mb-4 text-xl">
                            <i class="fas" :class="modal.isDanger ? 'fa-exclamation-triangle' : 'fa-info-circle'"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">{{ modal.title }}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed">{{ modal.message }}</p>
                    </div>
                    <div class="bg-slate-50 p-4 flex gap-3 justify-end">
                        <button @click="modal.show = false" class="px-4 py-2 text-sm font-bold text-slate-500 hover:text-slate-700">取消</button>
                        <button @click="executeModalAction" :class="modal.isDanger ? 'bg-red-500 hover:bg-red-600' : 'bg-indigo-600 hover:bg-indigo-700'" class="px-6 py-2 text-white rounded-lg text-sm font-bold shadow-md transition-colors">确认</button>
                    </div>
                </div>
            </transition>
        </div>
    </transition>
</div>

<template id="node-template">
    <div class="node-wrapper py-1 transition-colors rounded-lg" :style="{ marginLeft: depth > 0 ? '28px' : '0' }">
        <div class="group flex items-start relative px-2">
            
            <div v-if="multiSelect" class="mt-2 mr-2">
                <input type="checkbox" :checked="selectedIds.includes(node.id)" @change="$emit('toggle-select', node.id)" class="w-4 h-4 rounded border-slate-300 text-indigo-600">
            </div>

            <div class="drag-handle mt-1.5 flex items-center justify-center text-xs">
                <i class="fas fa-grip-vertical"></i>
            </div>

            <div class="flex-1 relative overflow-hidden">
                <div v-if="node.collapsed && isLongText" 
                     @click="expandAndFocus"
                     class="preview-text py-1"
                     :style="computedBaseStyle"
                     v-html="node.title || '...'">
                </div>

                <div
                    v-show="!node.collapsed || !isLongText"
                    :id="'input-' + node.id"
                    contenteditable="true"
                    data-placeholder="请输入内容..."
                    @input="onLocalInput"
                    @blur="onBlur"
                    @focus="$emit('focus-node', node.id)"
                    @keydown.tab.prevent="onTab"
                    @keydown.enter.prevent="onEnter"
                    @keydown.delete="onDelete"
                    class="node-input bg-transparent border-none outline-none py-1 transition-all"
                    :class="{ 'style-override': isSelected }"
                    :style="computedBaseStyle"
                    ref="editorRef"
                ></div>
            </div>

            <div class="action-sticky-bar flex items-center gap-1 shrink-0 ml-2">
                <button v-if="isLongText" @click="toggleCollapse" class="text-[10px] bg-white text-indigo-600 hover:bg-indigo-600 hover:text-white px-2 py-0.5 rounded font-bold transition-all border border-indigo-100 shadow-sm">
                    {{ node.collapsed ? '展开' : '收起' }}
                </button>
                <div class="flex opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 px-1 rounded">
                    <i @click="addChild" class="fas fa-plus p-1.5 text-slate-400 hover:text-indigo-500 cursor-pointer" title="添加子节点"></i>
                    <i @click="$emit('request-delete', { parentList, index })" class="fas fa-trash-alt p-1.5 text-slate-400 hover:text-red-500 cursor-pointer" title="删除节点"></i>
                </div>
            </div>
        </div>
        
        <div v-if="node.children && node.children.length > 0" 
             class="mt-1 border-l-2 border-slate-100/50 ml-4 sortable-container"
             :data-parent-id="node.id">
            <outline-node 
                v-for="(child, idx) in node.children" 
                :key="child.id"
                :node="child" 
                :depth="depth + 1" 
                :parent-list="node.children" 
                :index="idx"
                :multi-select="multiSelect"
                :selected-ids="selectedIds"
                :preview-style="previewStyle"
                @update="$emit('update')"
                @focus-node="(id) => $emit('focus-node', id)"
                @toggle-select="(id) => $emit('toggle-select', id)"
                @request-delete="(payload) => $emit('request-delete', payload)">
            </outline-node>
        </div>
    </div>
</template>

<script>
const { createApp, ref, reactive, nextTick, computed, onMounted, watch } = Vue;

const FONT_FAMILIES = [
    { label: '系统默认', value: 'inherit' },
    { label: '黑体 (无衬线)', value: '"PingFang SC", "Microsoft YaHei", sans-serif' },
    { label: '宋体 (衬线)', value: '"SimSun", "STSong", serif' },
    { label: '楷体 (手写)', value: '"KaiTi", "STKaiti", cursive' },
    { label: '仿宋', value: '"FangSong", "STFangsong", serif' },
    { label: '等宽字体', value: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace' }
];

const DEFAULT_STYLE = {
    color: '#1e293b',
    fontSize: 16,
    fontWeight: 'normal',
    fontStyle: 'normal',
    letterSpacing: 0,
    fontFamily: 'inherit'
};

const TEMPLATES = [
    { id: 'blank', name: '空白画布', icon: 'fas fa-file', iconBg: 'bg-slate-100 text-slate-500', title: '未命名大纲', nodes: [{ title: '在此输入内容...', children: [] }] },
    { id: 'game', name: '游戏策划模板', icon: 'fas fa-gamepad', iconBg: 'bg-indigo-100 text-indigo-500', title: '《项目代号》策划大纲', nodes: [
        { title: '<b>1. 核心概念与玩法 (Core Concepts)</b>', children: [
            { title: '1.1 玩法循环 (Game Loop)', children: [
                { title: '第一层循环：即时操作（如战斗、移动机制）', children: [] },
                { title: '第二层循环：单局目标（如关卡目标、资源收集）', children: [] },
                { title: '第三层循环：长线成长（如等级提升、装备获取）', children: [] }
            ] },
            { title: '1.2 核心机制 (Key Mechanics)', children: [
                { title: '机制A：详细描述该机制的触发条件与反馈', children: [] },
                { title: '机制B：描述与其他系统的交互关系', children: [] }
            ] }
        ] },
        { title: '<b>2. 游戏系统 (Game Systems)</b>', children: [
            { title: '2.1 角色/养成系统', children: [
                { title: '属性定义（力量、敏捷等基础数值含义）', children: [] },
                { title: '成长路径（技能树、转职或强化系统）', children: [] }
            ] },
            { title: '2.經濟系统', children: [
                { title: '产出途径（任务、掉落、充值）', children: [] },
                { title: '消耗途径（购买、升级、维护）', children: [] }
            ] }
        ] },
        { title: '<b>3. 世界观与剧情 (World Building)</b>', children: [
            { title: '3.1 故事背景', children: [
                { title: '时代背景设定', children: [] },
                { title: '主要势力/种族分布', children: [] }
            ] }
        ] }
    ]},
    { id: 'novel', name: '小说创作模板', icon: 'fas fa-book', iconBg: 'bg-amber-100 text-amber-500', title: '《作品名称》创作大纲', nodes: [
        { title: '<b>一、 世界观设定 (Setting)</b>', children: [
            { title: '1. 力量体系/自然法则', children: [
                { title: '体系基础：核心能源或能力的来源', children: [] },
                { title: '阶层划分：能力强弱的具体等级标准', children: [] },
                { title: '代价与局限：使用能力的负面影响', children: [] }
            ] },
            { title: '2. 地理与历史', children: [
                { title: '核心城市/领地介绍', children: [] },
                { title: '影响当前局势的历史重大事件', children: [] }
            ] }
        ] },
        { title: '<b>二、 人物小传 (Characters)</b>', children: [
            { title: '1. 主角组', children: [
                { title: '性格弧光：初始性格 -> 触发转变的事件 -> 最终性格', children: [] },
                { title: '外貌特征与核心道具', children: [] },
                { title: '核心矛盾：其内心深处的渴望与恐惧', children: [] }
            ] },

const OutlineNode = {
    name: 'OutlineNode',
    template: '#node-template',
    props: ['node', 'depth', 'parentList', 'index', 'multiSelect', 'selectedIds', 'previewStyle'],
    emits: ['update', 'request-delete', 'toggle-select', 'focus-node'],
    setup(props, { emit }) {
        const isLongText = ref(false);
        const editorRef = ref(null);
        const isSelected = computed(() => props.multiSelect && props.selectedIds.includes(props.node.id));

        const computedBaseStyle = computed(() => {
            const s = isSelected.value ? props.previewStyle : (props.node.style || {});
            let defWeight = 'normal';
            let defSize = 16;
            if (props.depth === 0) { defWeight = 'bold'; defSize = 20; }
            else if (props.depth === 1) { defWeight = 'bold'; defSize = 16; }

            return {
                color: s.color || '#1e293b',
                fontSize: (s.fontSize || defSize) + 'px',
                fontWeight: s.fontWeight || defWeight,
                fontStyle: s.fontStyle || 'normal',
                letterSpacing: (s.letterSpacing || 0) + 'px',
                fontFamily: s.fontFamily || 'inherit'
            };
        });

        const initSortable = () => {
            nextTick(() => {
                const containers = document.querySelectorAll('.sortable-container');
                containers.forEach(el => {
                    if (el._sortable) return;
                    el._sortable = Sortable.create(el, {
                        handle: '.drag-handle',
                        animation: 150,
                        ghostClass: 'sortable-ghost',
                        onEnd: (evt) => {
                            const list = props.parentList;
                            const item = list.splice(evt.oldIndex, 1)[0];
                            list.splice(evt.newIndex, 0, item);
                            emit('update');
                        }
                    });
                });
            });
        };

        onMounted(() => {
            if (editorRef.value) {
                editorRef.value.innerHTML = props.node.title || '';
                checkLineCount();
            }
            initSortable();
        });

        watch(() => props.node.title, (newVal) => {
            if (editorRef.value && editorRef.value.innerHTML !== newVal) {
                editorRef.value.innerHTML = newVal || '';
            }
        });

        const checkLineCount = () => {
            if (editorRef.value) {
                const lineHeight = parseFloat(getComputedStyle(editorRef.value).lineHeight);
                isLongText.value = editorRef.value.scrollHeight > lineHeight * 2.2; 
            }
        };

        const onLocalInput = (e) => {
            props.node.title = e.target.innerHTML;
            checkLineCount();
            emit('update');
        };

        const onBlur = () => {
            if (editorRef.value) {
                const spans = editorRef.value.querySelectorAll('span');
                spans.forEach(s => { if(s.textContent === '') s.remove(); });
                props.node.title = editorRef.value.innerHTML;
                emit('update');
            }
        };

        const toggleCollapse = () => { props.node.collapsed = !props.node.collapsed; };

        const expandAndFocus = () => {
            props.node.collapsed = false;
            nextTick(() => editorRef.value?.focus());
        };

        const onTab = () => {
            if (props.index > 0) {
                const prev = props.parentList[props.index - 1];
                const current = props.parentList.splice(props.index, 1)[0];
                if (!prev.children) prev.children = [];
                prev.children.push(current);
                emit('update');
                nextTick(() => {
                    document.getElementById('input-' + current.id)?.focus();
                    initSortable();
                });
            }
        };

        const onEnter = () => document.execCommand('insertLineBreak');

        const onDelete = (e) => {
            if ((props.node.title === '' || props.node.title === '<br>') && props.parentList.length > 1) {
                props.parentList.splice(props.index, 1);
                emit('update');
            }
        };

        const addChild = () => {
            if (!props.node.children) props.node.children = [];
            const newNode = { 
                id: 'n-' + Date.now() + Math.random().toString(36).substr(2,5), 
                title: '', 
                children: [], 
                collapsed: false,
                style: null 
            };
            props.node.children.push(newNode);
            emit('update');
            nextTick(() => {
                document.getElementById('input-' + newNode.id)?.focus();
                initSortable();
            });
        };

        return { 
            onTab, onDelete, addChild, onLocalInput, onBlur, onEnter, computedBaseStyle,
            isLongText, toggleCollapse, expandAndFocus, initSortable, editorRef, isSelected
        };
    }
};

createApp({
    components: { OutlineNode },
    setup() {
        const projects = ref([]);
        const currentProjectId = ref(null);
        const copyStatus = ref(false);
        const fontOptions = ref(FONT_FAMILIES);
        const showTemplateMenu = ref(false);
        const templateList = ref(TEMPLATES);
        const currentProject = computed(() => projects.value.find(p => p.id === currentProjectId.value));

        const activeStyle = reactive({...DEFAULT_STYLE});
        const multiSelectMode = ref(false);
        const selectedNodeIds = ref([]);
        const lastFocusedNodeId = ref(null);

        const modal = reactive({ show: false, title: '', message: '', isDanger: false, onConfirm: null });

        onMounted(() => {
            const saved = localStorage.getItem('outline_rich_v1');
            if (saved) {
                projects.value = JSON.parse(saved);
                if (projects.value.length > 0) currentProjectId.value = projects.value[0].id;
            } else {
                projects.value = [];
                currentProjectId.value = null;
            }
        });

        const save = () => localStorage.setItem('outline_rich_v1', JSON.stringify(projects.value));
        const handleInput = (e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; };
        const switchProject = (id) => { currentProjectId.value = id; multiSelectMode.value = false; };

        const createNewProject = (template = null) => {
            const id = 'p-' + Date.now();
            let newNodes = [];
            let newTitle = '未命名大纲';
            if (template) {
                newTitle = template.title;
                const processTplNodes = (nodes) => nodes.map(n => ({
                    id: 'n-' + Math.random().toString(36).substr(2, 9),
                    title: n.title,
                    collapsed: false,
                    style: null,
                    children: n.children ? processTplNodes(n.children) : []
                }));
                newNodes = processTplNodes(template.nodes);
            } else {
                newNodes = [{ id: 'n-' + Date.now(), title: '', children: [], collapsed: false, style: null }];
            }
            projects.value.unshift({ id, title: newTitle, nodes: newNodes });
            currentProjectId.value = id;
            showTemplateMenu.value = false;
            save();
        };

        const importProject = () => {
            const input = prompt("请粘贴导出的项目内容（支持一比一还原）：");
            if (!input) return;
            try {
                const match = input.match(/---PROJ_DATA_START---(.*?)---PROJ_DATA_END---/);
                const jsonStr = match ? match[1] : input;
                const data = JSON.parse(jsonStr);
                
                if (!data.nodes || !Array.isArray(data.nodes)) throw new Error("无效的大纲数据");

                const newId = 'p-' + Date.now();
                projects.value.unshift({
                    id: newId,
                    title: data.title || "导入的项目",
                    nodes: data.nodes
                });
                currentProjectId.value = newId;
                save();
                alert("项目导入成功！");
            } catch (e) {
                alert("导入失败：内容格式不正确，请确保复制了完整的导出文本。");
            }
        };

        const copyAllText = () => {
            const generate = (nodes, depth = 0) => {
                let res = "";
                nodes.forEach(n => {
                    const plainTitle = getTitleText(n.title).trim();
                    if (plainTitle) {
                        res += "  ".repeat(depth) + "- " + plainTitle + "\n";
                        if (n.children) res += generate(n.children, depth + 1);
                    }
                });
                return res;
            };

            const plainText = `【${currentProject.value.title}】\n\n` + generate(currentProject.value.nodes);
            const restoreData = {
                title: currentProject.value.title,
                nodes: currentProject.value.nodes
            };
            const fullContent = `${plainText}\n\n---项目数据(导入时请全部复制)---\n---PROJ_DATA_START---${JSON.stringify(restoreData)}---PROJ_DATA_END---`;

            navigator.clipboard.writeText(fullContent).then(() => {
                copyStatus.value = true;
                setTimeout(() => copyStatus.value = false, 2000);
            });
        };

        const addTopNode = () => {
            const id = 'n-' + Date.now();
            currentProject.value.nodes.push({ id, title: '', children: [], collapsed: false, style: null });
            save();
            nextTick(() => document.getElementById('input-' + id)?.focus());
        };

        const getTitleText = (html) => {
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        };

        const handleNodeFocus = (id) => { lastFocusedNodeId.value = id; };

        const syncSelectionStyle = (specificProp = null) => {
            if (multiSelectMode.value) return; 
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) return;
            const editor = document.getElementById('input-' + lastFocusedNodeId.value);
            if (!editor || !editor.contains(selection.anchorNode)) return;
            const range = selection.getRangeAt(0);
            if (specificProp === 'color') {
                document.execCommand('foreColor', false, activeStyle.color);
            } else {
                const contents = range.extractContents();
                const wrapper = document.createElement('span');
                if (specificProp === 'fontSize') wrapper.style.fontSize = activeStyle.fontSize + 'px';
                if (specificProp === 'fontWeight') wrapper.style.fontWeight = activeStyle.fontWeight;
                if (specificProp === 'fontStyle') wrapper.style.fontStyle = activeStyle.fontStyle;
                if (specificProp === 'letterSpacing') wrapper.style.letterSpacing = activeStyle.letterSpacing + 'px';
                if (specificProp === 'fontFamily') wrapper.style.fontFamily = activeStyle.fontFamily;

                const tempDiv = document.createElement('div');
                tempDiv.appendChild(contents);
                const clearInternalStyle = (el) => {
                    if (el.nodeType === 1) {
                        if (specificProp === 'fontSize') el.style.fontSize = '';
                        if (specificProp === 'fontWeight') el.style.fontWeight = '';
                        if (specificProp === 'fontStyle') el.style.fontStyle = '';
                        if (specificProp === 'letterSpacing') el.style.letterSpacing = '';
                        if (specificProp === 'fontFamily') el.style.fontFamily = '';
                        Array.from(el.children).forEach(clearInternalStyle);
                    }
                };
                clearInternalStyle(tempDiv);
                wrapper.innerHTML = tempDiv.innerHTML;
                range.insertNode(wrapper);
            }
            const node = findNodeById(currentProject.value.nodes, lastFocusedNodeId.value);
            if (node) { node.title = editor.innerHTML; save(); }
        };

        const findNodeById = (nodes, id) => {
            for (const n of nodes) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findNodeById(n.children, id);
                    if (found) return found;
                }
            }
            return null;
        };

        const toggleStyle = (prop, val1, val2) => {
            activeStyle[prop] = activeStyle[prop] === val1 ? val2 : val1;
            syncSelectionStyle(prop);
        };

        const enterMultiSelect = () => { multiSelectMode.value = true; selectedNodeIds.value = []; };
        const exitMultiSelect = () => { multiSelectMode.value = false; selectedNodeIds.value = []; };

        const selectAllNodes = () => {
            const ids = [];
            const collect = (nodes) => {
                nodes.forEach(n => {
                    ids.push(n.id);
                    if (n.children) collect(n.children);
                });
            };
            collect(currentProject.value.nodes);
            selectedNodeIds.value = ids;
        };

        const toggleNodeSelection = (id) => {
            const idx = selectedNodeIds.value.indexOf(id);
            if (idx > -1) selectedNodeIds.value.splice(idx, 1);
            else selectedNodeIds.value.push(id);
        };

        const applyStyleToSelected = () => {
            const updateNode = (nodes) => {
                nodes.forEach(node => {
                    if (selectedNodeIds.value.includes(node.id)) {
                        node.style = {...activeStyle};
                        const tmp = document.createElement("div");
                        tmp.innerHTML = node.title;
                        const clearStyles = (el) => {
                            if (el.nodeType === 1) {
                                el.style.cssText = "";
                                Array.from(el.children).forEach(clearStyles);
                            }
                        };
                        clearStyles(tmp);
                        node.title = tmp.innerHTML;
                    }
                    if (node.children) updateNode(node.children);
                });
            };
            updateNode(currentProject.value.nodes);
            save();
            exitMultiSelect();
        };

        const availableDepths = computed(() => {
            if (!currentProject.value) return [];
            const depths = new Set();
            const traverse = (nodes, d) => {
                nodes.forEach(n => {
                    depths.add(d);
                    if (n.children) traverse(n.children, d + 1);
                });
            };
            traverse(currentProject.value.nodes, 0);
            return Array.from(depths).sort((a, b) => a - b);
        });

        const selectNodesByDepth = (targetDepth) => {
            const ids = [];
            const traverse = (nodes, d) => {
                nodes.forEach(n => {
                    if (d === targetDepth) ids.push(n.id);
                    if (n.children) traverse(n.children, d + 1);
                });
            };
            traverse(currentProject.value.nodes, 0);
            selectedNodeIds.value = ids;
        };

        const confirmDeleteProject = (id) => {
            modal.title = "删除项目";
            modal.message = "此操作不可逆，项目内所有大纲内容将被清除。";
            modal.isDanger = true;
            modal.show = true;
            modal.onConfirm = () => {
                projects.value = projects.value.filter(p => p.id !== id);
                if (currentProjectId.value === id) currentProjectId.value = projects.value[0]?.id || null;
                save();
            };
        };

        const confirmDeleteNode = ({ parentList, index }) => {
            modal.title = "删除节点";
            modal.message = "确定删除该节点及其所有的子内容吗？";
            modal.isDanger = true;
            modal.show = true;
            modal.onConfirm = () => {
                parentList.splice(index, 1);
                save();
            };
        };

        const confirmDeleteSelectedNodes = () => {
            modal.title = "批量删除";
            modal.message = `确定删除选中的 ${selectedNodeIds.value.length} 个节点及其所有子节点吗？`;
            modal.isDanger = true;
            modal.show = true;
            modal.onConfirm = () => {
                const deleteFromList = (list) => {
                    for (let i = list.length - 1; i >= 0; i--) {
                        if (selectedNodeIds.value.includes(list[i].id)) {
                            list.splice(i, 1);
                        } else if (list[i].children) {
                            deleteFromList(list[i].children);
                        }
                    }
                };
                deleteFromList(currentProject.value.nodes);
                if (currentProject.value.nodes.length === 0) {
                    currentProject.value.nodes.push({ id: 'n-' + Date.now(), title: '', children: [], collapsed: false, style: null });
                }
                save();
                exitMultiSelect();
            };
        };

        const executeModalAction = () => { if (modal.onConfirm) modal.onConfirm(); modal.show = false; };

        const handleGlobalClick = (e) => {
            if (!e.target.closest('#style-panel') && !e.target.closest('.node-wrapper')) lastFocusedNodeId.value = null;
            if (!e.target.closest('.relative')) showTemplateMenu.value = false;
        };

        return { 
            projects, currentProjectId, currentProject, copyStatus, fontOptions,
            activeStyle, multiSelectMode, selectedNodeIds, lastFocusedNodeId,
            modal, confirmDeleteProject, confirmDeleteNode, executeModalAction,
            createNewProject, importProject, switchProject, addTopNode, save, handleInput, copyAllText, toggleStyle, 
            toggleNodeSelection, enterMultiSelect, exitMultiSelect,
            applyStyleToSelected, selectAllNodes, syncSelectionStyle, handleNodeFocus, handleGlobalClick,
            getTitleText, availableDepths, selectNodesByDepth, confirmDeleteSelectedNodes,
            showTemplateMenu, templateList
        };
    }
}).mount('#app');
</script>
